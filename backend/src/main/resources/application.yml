# ============================================================
# Application Configuration — YCYW Chat PoC
# ============================================================

spring:
  application:
    name: ycyw-chat-poc

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ycyw}
    username: ${SPRING_DATASOURCE_USERNAME:ycyw}
    password: ${SPRING_DATASOURCE_PASSWORD:ycyw_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8080

# OpenAPI / Swagger
springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /api/swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.ycyw: DEBUG
    org.springframework.web.socket: DEBUG
